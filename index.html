<!DOCTYPE html>
<html lang="en">


<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Web App - 2</title>


   <style>
       * {
           padding: 0;
           margin: 0;
           box-sizing: border-box;
       }


       header {
           display: flex;
           gap: 64px;
           padding: 24px 32px;
       }


       nav {
           display: flex;
           gap: 32px;
           font-size: 18px;
       }


       #root {
           display: flex;
           padding: 48px;
           gap: 48px;
           flex-wrap: wrap;
       }


       .card {
           padding-right: 24px;
           border: 2px solid brown;
           border-radius: 16px;


           display: flex;
           align-items: center;
           gap: 24px;


           overflow: hidden;
       }


       img {
           max-height: 125px;
           border-top-left-radius: 12px;
           border-bottom-left-radius: 12px;
       }


       button {
           padding: 4px 8px;
           border-radius: 6px;
           border: 1px solid grey;
           cursor: pointer;
           margin: 6px 4px;
       }
   </style>
</head>


<body>
   <header>
       <h3>Product Inventory</h3>
       <nav>
           <a href="./index.html">Home</a>
           <a href="./add-product.html">Add Product</a>
       </nav>
   </header>
   <main id="root"></main>
   <footer></footer>


   <script>
       function main(arr) {
           for (let i = 0; i < arr.length; i++) {
               const newCard = document.createElement("div");
               newCard.className = "card";
               newCard.innerHTML = `
                     <img src="${arr[i].thumbnail}" />
                     <div class="product-info">
                         <h4> ${arr[i].title} </h4>
                         <p>Price: Rs. ${arr[i].price} </p>
                         <p>Rating: ${arr[i].rating} ⭐️</p>
                         <button onclick="handleEdit(${arr[i].id})">Edit</button>
                         <button onclick="handleDeleteProduct(${arr[i].id})">Delete</button>
                     </div>
                 `;
               const root = document.getElementById("root");
               root.appendChild(newCard);
           }
       }


       async function getData() {
           const URL = "http://localhost:5001/products";
           const response = await fetch(URL);
           const data = await response.json();
           console.log(data);


           main(data.products);
       }


       getData();


       async function handleDeleteProduct(productId) {
           const response = await fetch(`http://localhost:5001/products/${productId}`, {
               method: "DELETE",
           });


           window.location.reload();
       }


       function handleEdit(productId) {
           window.open(`./edit-product.html?id=${productId}`, "_self");
           // example: ./edit-product.html?id=1
           // example: ./edit-product.html?id=17
           // example: ./edit-product.html?id=8
       }
   </script>
</body>


</html>
